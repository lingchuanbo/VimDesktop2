[Config]
; 日志记录开关 (true/false)
EnableLogging=false

; 日志级别 (DEBUG/INFO/WARN/ERROR)
LogLevel=ERROR

; 日志文件路径
LogFile=init_log.txt
; 日志文件大小限制 (MB)
LogFileSize=10

[AfterEffects]
; 插件按键超时时间(ms)
set_time_out=300

; IME自动切换配置
ime_enabled=true
ime_enable_debug=false
ime_check_interval=200
ime_enable_mouse_click=true
ime_max_retries=3
ime_auto_switch_timeout=5000
